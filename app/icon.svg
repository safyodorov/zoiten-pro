<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="0" fill="#000000"/>
  <g transform="translate(256,256)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="195"/>
    <!-- Inner circle-like structure -->
    <circle cx="0" cy="0" r="120"/>
    <!-- Vertical divider -->
    <line x1="0" y1="-195" x2="0" y2="195"/>
    <!-- Left side curves (mirrored Z) -->
    <path d="M 0,-120 C -66,-120 -120,-66 -120,0" stroke-width="26"/>
    <path d="M -120,0 C -120,66 -66,120 0,120" stroke-width="26"/>
    <!-- Right side curves (Z) -->
    <path d="M 0,-120 C 66,-120 120,-66 120,0" stroke-width="26"/>
    <path d="M 120,0 C 120,66 66,120 0,120" stroke-width="26"/>
  </g>
</svg>